<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>CipherVault Login</h1>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>Email</p>
    {{ form.email() }}

    <br><br>

    <p>Password</p>
    {{ form.password() }}

    <br><br>

    {{ form.submit() }}

</form>

<p>
    Don't have an account?
    <a href="{{ url_for('auth.register') }}">
        Register
    </a>
</p>

</body>
</html>
